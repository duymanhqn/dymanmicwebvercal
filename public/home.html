<div class="container">

<h2>Home</h2>

<p>Welcome 🎉</p>

<button onclick="logout()">Logout</button>

</div>

<script>

if(!localStorage.getItem("login")){
window.location.href="/login.html"
}

function logout(){
localStorage.removeItem("login")
window.location.href="/login.html"
}

</script>
